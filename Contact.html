<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - 212 Clothing</title>
  <link rel="stylesheet" href="/CSS/styles1.css">
  <link rel="website icon" href="/Logo/Logo.png">
</head>
<body>
  <header>
    <h1>212 CLOTHING</h1>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/Index.html#products">Products</a>
      <a href="#" id="cartIcon" class="nav-cart-link">
        <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="Cart" class="cart-img-white">
        <span id="cartItemCount" class="cart-badge">0</span>
      </a>
    </nav>
  </header>
  <main class="contact-container">
    <h2>Get in Touch</h2>
    <form class="contact-form" action="#" method="POST">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="subject">Subject:</label>
      <input type="text" id="subject" name="subject">

      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit" class="button">Send Message</button>
    </form>
    <div class="contact-info">
      <p>Alternatively, you can reach us via:</p>
      <p>Email: <a href="mailto:support@212clothing.com">support@212clothing.com</a></p>
      <p>Phone: +1 (555) 123-4567</p>
      <p>Address: 123 Neon Street, Cyber City, 90210</p>
    </div>
  </main>
  <footer class="footer" id="Contact">
    <p>Contact us at: support@212clothing.com | &copy; 2026 212 Clothing</p>
    <div class="social-icons">
      <a href="https://www.instagram.com/212clothing.ma?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
      </a>
      <a href="https://www.facebook.com/share/1CXrF7MTsS/" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
      <a href="https://www.tiktok.com/@212clothing.ma?_r=1&_t=ZS-95SiawBc43A" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
      </a>
    </div>
  </footer>
</body>
</html>
