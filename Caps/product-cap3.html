<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biker Cap</title>
  <link rel="stylesheet" href="/CSS/styles1.css">
  <link rel="website icon" href="/Logo/logo.png">
</head>
<body>
  <header>
    <h1>212 CLOTHING</h1>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/Caps/caps.html">Products</a>
      <a href="/index.html">Contact</a>
    </nav>
  </header>
  <main class="container">
    <div class="image-box">
      <div class="main-image">
        <img id="mainProductImage" src="/Caps/Cap3.jpg" alt="Biker Cap">
      </div>
      <div class="thumbnails">
        <img src="/Caps/Cap3.jpg" alt="Front" class="active" onclick="changeImage(this)">
        <img src="/Caps/Cap3².jpg" alt="Back"  onclick="changeImage(this)">
      </div>
    </div>
    <div class="details">
      <h2>Biker Cap</h2>
      <p>Top off your biker look with this sleek and adjustable cap. Lightweight and rugged, perfect for sunny days on or off the road.</p>
      <p class="price">$14.99</p>
      <p><strong>Sizes:</strong> Adjustable</p>
      <p><strong>Colors:</strong> Black, Navy, Olive</p>
      <button class="button"  onclick="window.open('https://my-store-e6f49b.creator-spring.com/listing/get-speed-cap?product=2173&variation=106060', '_blank')">Buy Now</button>
    </div>
  </main>
  <footer class="footer">
    <p>Contact us at: support@212clothing.com | &copy; 2026 212 Clothing</p>
    <div class="social-icons">
      <a href="https://www.instagram.com/212clothing.ma?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
      </a>
      <a href="https://www.facebook.com/share/1CXrF7MTsS/" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
      <a href="https://www.tiktok.com/@212clothing.ma?_r=1&_t=ZS-95SiawBc43A" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
      </a>
    </div>
  </footer>
  <script>
    function changeImage(thumb) {
      const mainImage = document.getElementById("mainProductImage");
      mainImage.src = thumb.src;

      document.querySelectorAll(".thumbnails img").forEach(img => img.classList.remove("active"));
      thumb.classList.add("active");
    }
  </script>
</body>
</html>
